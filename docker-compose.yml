services:
  # The MongoDB Database
  mongodb:
    image: mongo:4.4.29
    platform: linux/amd64
    container_name: mongodb
    restart: on-failure
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  # The Lavalink Server
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink
    container_name: lavalink
    restart: on-failure
    ports:
      - "2333:2333"
    environment:
      - LAVALINK_SERVER_PASSWORD=youshallnotpass
      - SERVER_PORT=2333
      - SERVER_ADDRESS=0.0.0.0
    healthcheck:
      # Checks Lavalink readiness by calling the authenticated REST endpoint.
      test:
        [
          "CMD-SHELL",
          "bash -lc 'exec 3<>/dev/tcp/localhost/2333 && printf \"GET /version HTTP/1.1\\r\\nHost: localhost\\r\\nAuthorization: youshallnotpass\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && head -n 1 <&3 | grep -q \"200\"'"
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  # The Discord Bot
  sermon:
    image: primemusic-lavalink-bot
    container_name: sermon_bot
    restart: on-failure
    environment:
      TOKEN: ${SERMON_DISCORD_BOT_TOKEN}
      LANGUAGE: "en"
      OWNER_IDS: "636950962245730324,1441688644267282503"
      MONGODB_URI: "mongodb://admin:password@mongodb:27017/PrimeMusicSSRR?authSource=admin"
      SPOTIFY_CLIENT_ID: ""
      SPOTIFY_CLIENT_SECRET: ""
      SETUP_FILE_PATH: "./commands/setup.json"
      COMMANDS_DIR: "./commands"
      EMBED_COLOR: "#1d96e1"
      CUSTOM_EMOJI: "false"
      EMOJI_THEME: "redwhite"
      HELP_BANNER_URL: "https://remnantofgod.org/assets/img/wtpr-main-new.png"
      ACTIVITY_NAME: "WTPR"
      ACTIVITY_TYPE: "LISTENING"
      SUPPORT_SERVER: ""
      EMBED_TIMEOUT: "5"
      SHOW_PROGRESS_BAR: "true"
      SHOW_VISUALIZER: "true"
      GENERATE_SONG_CARD: "true"
      METADATA_TAG: "true"
      LOW_MEMORY_MODE: "true"
      ERROR_LOG: ""
      NODES: '[{"name":"LocalNode","password":"youshallnotpass","host":"lavalink","port":2333,"secure":false}]'
    depends_on:
      mongodb:
        condition: service_healthy
      lavalink:
        condition: service_healthy

  # The Discord Bot
  musicbot:
    image: primemusic-lavalink-bot
    container_name: music_bot
    restart: on-failure
    environment:
      TOKEN: ${MUSIC_DISCORD_BOT_TOKEN}
      LANGUAGE: "en"
      OWNER_IDS: "636950962245730324,1441688644267282503"
      MONGODB_URI: "mongodb://admin:password@mongodb:27017/PrimeMusicSSRR?authSource=admin"
      SPOTIFY_CLIENT_ID: ""
      SPOTIFY_CLIENT_SECRET: ""
      SETUP_FILE_PATH: "./commands/setup.json"
      COMMANDS_DIR: "./commands"
      EMBED_COLOR: "#1d96e1"
      CUSTOM_EMOJI: "false"
      EMOJI_THEME: "redwhite"
      HELP_BANNER_URL: ""
      ACTIVITY_NAME: "Music"
      ACTIVITY_TYPE: "LISTENING"
      SUPPORT_SERVER: ""
      EMBED_TIMEOUT: "5"
      SHOW_PROGRESS_BAR: "true"
      SHOW_VISUALIZER: "true"
      GENERATE_SONG_CARD: "true"
      METADATA_TAG: "true"
      LOW_MEMORY_MODE: "true"
      ERROR_LOG: ""
      NODES: '[{"name":"LocalNode","password":"youshallnotpass","host":"lavalink","port":2333,"secure":false}]'
    depends_on:
      mongodb:
        condition: service_healthy
      lavalink:
        condition: service_healthy

volumes:
  mongodb_data:
    driver: local